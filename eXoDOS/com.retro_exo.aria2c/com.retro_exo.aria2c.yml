app-id: com.retro_exo.aria2c
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk

command: aria2c

finish-args:
  - --device=all          # we need OpenGL and controller access
  - --share=network       # IPX, libslirp and serial port emulation over UDP
  - --filesystem=host

modules:

  - name: aria2c
    buildsystem: simple
    cleanup:
      - '*.la'
    sources:
      - type: archive
        url: https://github.com/aria2/aria2/releases/download/release-1.37.0/aria2-1.37.0.tar.gz
        sha256: 8e7021c6d5e8f8240c9cc19482e0c8589540836747744724d86bf8af5a21f0e8
    build-commands:
      - autoreconf -i
      - ./configure ARIA2_STATIC=yes --prefix=/app --libdir=/app/lib
      - make
      - make install
