---
app-id: com.retro_exo.dosbox-x-08220
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk

command: dosbox-x
appstream-compose: false

finish-args:         # flatpak permissions
  - --device=all     # needed for OpenGL, gamepads and serial/parallel
  - --share=ipc      # needed for X11
  - --share=network  # Needed for IPX and serial over TCP/IP
  - --socket=x11     # default to X11, as Gnome does not provide SSD
  - --socket=pulseaudio
  - --filesystem=host

cleanup:
  - '/include'
  - '/lib/pkgconfig'
  - '/share/aclocal'
  - '/share/man'
  - '*.la'
  - '*.a'
  - '/share/doc'
  - '/share/applications'
  - '/share/icons'
  - '/share/metainfo'
  - '/share/appdata'

modules:

  # Build Mesa GLU
  - "shared-modules/glu/glu-9.json"

  # Build FluidSynth for General MIDI emulation
  - "shared-modules/linux-audio/fluidsynth2.json"

  # Build libslirp for TCP/IP networking
  - name: libslirp
    buildsystem: meson
    cleanup:
      - "/include"
      - "/lib/pkgconfig"
    sources:
      - type: archive
        url: https://gitlab.freedesktop.org/slirp/libslirp/-/archive/v4.9.1/libslirp-v4.9.1.tar.gz
        sha256: 3970542143b7c11e6a09a4d2b50f30a133473c41f15ed0bdcc3b7a1c450d9a5c
        x-checker-data:
          type: anitya
          project-id: 96796
          url-template: https://gitlab.freedesktop.org/slirp/libslirp/-/archive/v$version/libslirp-v$version.tar.gz

  # Build DOSBox-X SDL2
  - name: dosbox-x
    buildsystem: autotools
    config-opts:
      - --enable-core-inline
      - --enable-sdl2
    sources:
      - type: git
        url: https://github.com/joncampbell123/dosbox-x
        tag: "dosbox-x-v0.82.20"
    x-checker-data:
      type: anitya
      project-id: 242383
      stable-only: true
      tag-template: dosbox-x-v$version
...
