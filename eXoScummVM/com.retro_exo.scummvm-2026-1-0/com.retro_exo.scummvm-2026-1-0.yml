app-id: com.retro_exo.scummvm-2026-1-0
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
finish-args:
  - --device=all
  - --share=ipc
  - --share=network
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  - --filesystem=host
command: scummvm_wrapper
cleanup:
  - /include
  - /lib/pkgconfig
  - /share/aclocal
  - /share/man
  - '*.la'
  - '*.a'
  - /share/applications
  - /share/icons
  - /share/metainfo
  - /share/appdata
modules:
  - ../shared/shared-modules/libmad/libmad.json
  - ../shared/shared-modules/glu/glu-9.json
  - ../shared/shared-modules/glew/glew.json
  - ../shared/shared-modules/linux-audio/fluidsynth2.json

  - name: fluid_soundfont
    buildsystem: simple
    sources:
      - type: archive
        url: http://deb.debian.org/debian/pool/main/f/fluid-soundfont/fluid-soundfont_3.1.orig.tar.gz
        sha256: 2621acaa1c78e4abdb24bdd163230cc577e61276936d6aa6e3180582142f0343
        x-checker-data:
          type: anitya
          project-id: 117393
          url-template: http://deb.debian.org/debian/pool/main/f/fluid-soundfont/fluid-soundfont_$version.orig.tar.gz
    build-commands:
      - install -Dm644 FluidR3_GM.sf2 /app/share/soundfonts/FluidR3_GM.sf2

  - name: faad2
    buildsystem: cmake-ninja
    sources:
      - type: archive
        url: https://github.com/knik0/faad2/archive/2.11.2.tar.gz
        sha256: 3fcbd305e4abd34768c62050e18ca0986f7d9c5eca343fb98275418013065c0e
        x-checker-data:
          type: anitya
          project-id: 13755
          url-template: https://github.com/knik0/faad2/archive/$version.tar.gz

  - name: libmpeg2
    sources:
      - type: archive
        url: https://download.videolan.org/contrib/libmpeg2/libmpeg2-0.5.1.tar.gz
        sha256: dee22e893cb5fc2b2b6ebd60b88478ab8556cb3b93f9a0d7ce8f3b61851871d4
        x-checker-data:
          type: anitya
          project-id: 21490
          url-template: https://download.videolan.org/contrib/libmpeg2/libmpeg2-$version.tar.gz
      - type: shell
        commands:
          - cp /usr/share/automake-*/config.{guess,sub} .auto/

  - name: liba52
    sources:
      - type: archive
        url: https://git.adelielinux.org/community/a52dec/-/archive/v0.8.0/a52dec-v0.8.0.tar.gz
        sha256: 470d084074d15416a0f0f300b85b61ddcc1ce105ad14a2aac670a1767ecba8de
        x-checker-data:
          type: anitya
          project-id: 13972
          url-template: https://git.adelielinux.org/community/a52dec/-/archive/v$version/a52dec-v$version.tar.gz

  - name: scummvm_wrapper
    buildsystem: simple
    sources:
      - type: file
        path: ../shared/scummvm_wrapper/scummvm_wrapper.py
      - type: file
        path: ../shared/scummvm_wrapper/setup.py
    build-commands:
      - python3 -mpip install . --no-build-isolation --prefix=/app --no-index --find-links .

  - name: scummvm
    sources:
      - type: archive
        url: https://github.com/scummvm/scummvm/archive/refs/tags/v2026.1.0.tar.gz
        sha256: fe67167459f68f2335babc86e63fcb1a2e62bce8fac6b435e28240a07e2d7b59
        x-checker-data:
          type: anitya
          project-id: 4775
          url-template: https://downloads.scummvm.org/frs/scummvm/$version/scummvm-$version.tar.bz2
    config-opts:
      - --enable-release
      - --disable-debug
      - --disable-system-dialogs
